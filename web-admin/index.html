<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Precision - Web Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase App (the core Firebase SDK) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // You MUST add a Web App to your Firebase Project and copy its config here.
    // The current config uses your Android API key, which may not support all Web features perfectly.
    const firebaseConfig = {
      apiKey: "AIzaSyBeMsTGjqVGl6sDE64tDGMTYL4sXUs_smk",
      projectId: "custom-mix-241020",
      storageBucket: "custom-mix-241020.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadInvoices() {
      const list = document.getElementById('invoice-list');
      list.innerHTML = 'Loading...';
      try {
        const querySnapshot = await getDocs(collection(db, "invoices"));
        list.innerHTML = '';
        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const tr = document.createElement('tr');
          tr.className = "border-b";
          tr.innerHTML = `
            <td class="p-2">${data.customerName || 'N/A'}</td>
            <td class="p-2">${data.gstin || 'N/A'}</td>
            <td class="p-2 font-mono">₹${data.totalAmount?.toFixed(2) || '0.00'}</td>
            <td class="p-2"><button data-id="${docSnap.id}" class="delete-btn text-red-500 hover:text-red-700">Delete</button></td>
          `;
          list.appendChild(tr);
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
             const id = e.target.getAttribute('data-id');
             if(confirm("Delete this invoice?")) {
                await deleteDoc(doc(db, "invoices", id));
                loadInvoices();
             }
          });
        });

      } catch (e) {
        console.error("Error fetching invoices: ", e);
        list.innerHTML = `<span class="text-red-500">Error loading data. Check console.</span>`;
      }
    }

    window.onload = loadInvoices;
  </script>
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-blue-800">GST Precision - Admin Panel</h1>
    <p class="text-gray-600 mb-6">Deploy this folder to Vercel/GitHub pages. It connects to your Firebase database to view and manage app data.</p>
    
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold">Invoices</h2>
      <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Refresh</button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 border-b">
            <th class="p-2">Customer Name</th>
            <th class="p-2">GSTIN</th>
            <th class="p-2">Total Amount</th>
            <th class="p-2">Action</th>
          </tr>
        </thead>
        <tbody id="invoice-list">
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
